id: secret_affair_public_performance
name: Secret Affair Public Performance
description: >
  Two positions are privately bound by secrecy while publicly performing
  distance. The secret creates co-presence, avoidance, and exposure risk.
field_state:
  material_pressures:
    material_urgency: 0.39
  spatial_constraints:
    public_event: 0.85
    private_message_thread: 0.8
  audience_pressure:
    spouses: 0.9
    colleagues: 0.75
  enacted_micro_worlds:
    - public_distance_private_signal

relation_metrics:
  unrecognized_contribution: 0.36
  public_private_gap: 0.96
  face_risk_pressure: 0.9
  silence_charge: 0.72
  conflict_pressure: 0.16
  repair_debt: 0.0
  operative_label_count: 0.0
  repair_debt_growth: 0.12
  irreversibility_threshold: 1.2
  locked_in_repair_threshold: 0.9
  cold_war_repair_threshold: 0.3

processes:
  p1:
    display_name: Secret Partner A
    fatigue: 0.6
    speech_inhibition:
      direct_need: 0.76
      anger: 0.7
    threat_sensitivity:
      being_used: 0.75
      being_ignored: 0.86
    relevance_triggers:
      unacknowledged_help: 0.68
      delayed_reply: 0.88
  p2:
    display_name: Secret Partner B
    fatigue: 0.62
    speech_inhibition:
      apology: 0.84
      dependency_admission: 0.82
      direct_need: 0.5
    threat_sensitivity:
      being_controlled: 0.9
    relevance_triggers:
      repeated_questions: 0.86
bindings:
  - binding_id: shared_secret
    binding_type: secret
    process_ids: [p1, p2]
    strength: 0.9
    exit_cost: {p1: 0.78, p2: 0.78}
  - binding_id: public_private_gap
    binding_type: reputational
    process_ids: [p1, p2]
    strength: 0.86
    exit_cost: {p1: 0.85, p2: 0.85}
recognition_demands:
  - demand_id: rec_private_choice
    holder_process_id: p1
    demanded_from: p2
    recognition_type: choose_me
    explicitness: 0.18
    vulnerability_cost: 0.9
    threat_if_denied: 0.92
    identity_dependency: 0.78
    current_pressure: 0.57
config_overrides:
  scheduler:
    forced_scene_ticks: [5, 12, 19, 26]

