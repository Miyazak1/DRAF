id: workplace_public_private_split
name: Workplace Public Private Split
description: >
  Two process positions remain bound by a shared work project. Publicly they
  must perform competence and collegiality; privately, one position carries
  unrecognized invisible labor while the other experiences accountability
  requests as control. This benchmark tests whether RPF mechanisms transfer
  outside an intimate shared-apartment frame.

field_state:
  material_pressures:
    material_urgency: 0.38
  spatial_constraints:
    meeting_room: 0.7
    shared_project_channel: 0.8
  audience_pressure:
    manager: 0.75
    project_team: 0.65
  enacted_micro_worlds:
    - project_channel_after_deadlines
    - polite_status_meetings

relation_metrics:
  unrecognized_contribution: 0.62
  public_private_gap: 0.9
  face_risk_pressure: 0.62
  recognition_pursuit_pressure: 0.55
  conflict_pressure: 0.04
  repair_debt: 0.02
  operative_label_count: 0.0
  repair_debt_growth: 0.45
  irreversibility_threshold: 0.9
  locked_in_repair_threshold: 0.8
  cold_war_repair_threshold: 0.35

processes:
  p1:
    display_name: Lead Analyst
    fatigue: 0.65
    speech_inhibition:
      direct_need: 0.55
      anger: 0.75
    threat_sensitivity:
      being_used: 0.85
      being_ignored: 0.7
    relevance_triggers:
      unacknowledged_help: 0.85
      delayed_reply: 0.5

  p2:
    display_name: Project Owner
    fatigue: 0.55
    speech_inhibition:
      apology: 0.75
      dependency_admission: 0.8
      direct_need: 0.45
    threat_sensitivity:
      being_controlled: 0.82
    relevance_triggers:
      repeated_questions: 0.85

bindings:
  - binding_id: shared_project_deadline
    binding_type: institutional
    process_ids: [p1, p2]
    strength: 0.88
    exit_cost:
      p1: 0.75
      p2: 0.7

  - binding_id: uncredited_invisible_labor
    binding_type: recognition
    process_ids: [p1, p2]
    strength: 0.78
    exit_cost:
      p1: 0.65
      p2: 0.45

recognition_demands:
  - demand_id: rec_credit_invisible_labor
    holder_process_id: p1
    demanded_from: p2
    recognition_type: admit_what_happened
    explicitness: 0.25
    vulnerability_cost: 0.7
    threat_if_denied: 0.85
    identity_dependency: 0.65
    current_pressure: 0.5

config_overrides:
  scheduler:
    forced_scene_ticks: [5, 11, 17, 23, 29]
    weights:
      scene:
        rent_pressure: 0.24
        binding_urgency: 0.22
        conflict_pressure: 0.2
        recognition_pressure: 0.22
        repair_debt: 0.16
        mean_fatigue: -0.06

