id: yellow_sign_cold_case
name: Yellow Sign Cold Case
description: >
  A cosmic-horror cold case scenario inspired by decayed investigative realism:
  two process positions are bound by an old ritual murder, unstable testimony,
  institutional rot, and recurring symbols that may be cult evidence, trauma,
  corruption, or something worse. The simulation should not prove the
  supernatural. It should model how an incompletely knowable truth deforms
  trust, testimony, memory, and relational viability.

render_canon:
  title: 黄印镇冷案
  setting:
    place: 黄印镇
    period: 当代，雨季之后
    atmosphere: 潮湿、腐败、克制，现实主义调查叙事中带有无法证实的宇宙恐怖残影
    material_objects:
      - 黄漆符号
      - 旧案卷宗
      - 被水泡胀的儿童画
      - 废弃炼油厂地图
      - 证物袋里的鹿角碎片
      - 旧录像带
  cast:
    p1:
      name: 林鸦
      gender: 女
      pronoun: 她
      age_band: 三十多岁
      surface_role: 十七年前冷案的幸存证人，如今被地方警局临时请回协助整理旧档
      speech_style: 低声、迟疑，常把句子停在事实边缘
      allowed_interiority: 只允许从停顿、回避、手势、证词断裂和身体反应中推断，不允许直接写内心独白
    p2:
      name: 周既白
      gender: 男
      pronoun: 他
      age_band: 四十岁出头
      surface_role: 外来的州调查员，负责重启黄印镇旧案
      speech_style: 程序化、克制，追问时句子很短
      allowed_interiority: 只允许写可观察到的专注、犹疑、记录动作和语气变化
  narration:
    language: 中文
    tense: 过去时
    perspective: 第三人称限制视角
    style: 腐烂现实主义、犯罪调查、克苏鲁式不可知恐怖，接近《真探》式的阴冷质感
    interiority_level: 低
    metaphor_level: 低到中，意象必须来自现场物件、气味、光线、档案、雨水、铁锈、霉斑
    sentence_rhythm: 短句与压抑的中长句交替，避免解释神秘学设定
    forbidden:
      - 直接出现怪物
      - 直接证明超自然存在
      - 新增凶手身份
      - 新增邪教组织名称
      - 新增亲属关系
      - 新增恋爱或婚姻状态
      - 新增未来预告
      - 写出人物内心独白
      - 把幻象当作客观事实
      - 把案件真相一次性揭开

