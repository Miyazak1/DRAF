memory:
  min_salience: 0.35
  decay_per_tick: 0.01
  source_weights:
    irreversibility: 0.9
    classification: 0.75
    recognition_failure: 0.58

rpp_dynamics:
  composition_min_intensity: 0.25
  decay_after_ticks: 3
  decay_delta: 0.04
  decay_floor: 0.03
  compositions:
    - composition_id: anxious_silence_circuit
      members: [pursuit_withdrawal, silence_interpretation_loop]
      threshold: 0.48
      relation_metric_weights:
        silence_charge: 0.035
      effect: uncertainty becomes the main medium of relation
    - composition_id: debt_lock
      members: [contribution_debt_loop, repair_avoidance]
      threshold: 0.5
      relation_metric_weights:
        repair_debt: 0.05
        memory_bias.defensive_reconstruction: 0.035
      effect: contribution history becomes hard to repair without increasing debt
    - composition_id: public_face_split
      members: [public_private_split, face_saving_loop]
      threshold: 0.48
      relation_metric_weights:
        public_private_gap: 0.04
        face_risk_pressure: 0.025
      effect: public performance preserves private injury
    - composition_id: care_bind_double_bind
      members: [complementary_dependency, double_bind]
      threshold: 0.52
      relation_metric_weights:
        care_dependency: 0.035
        double_bind_pressure: 0.025
      effect: care and agency become mutually punishing
    - composition_id: recognition_trap
      members: [recognition_pursuit, repair_avoidance]
      threshold: 0.5
      relation_metric_weights:
        recognition_pursuit_pressure: 0.025
      effect: demand for recognition makes recognition harder to grant
    - composition_id: credit_recognition_lock
      members: [contribution_debt_loop, recognition_pursuit]
      threshold: 0.5
      relation_metric_weights:
        unrecognized_contribution: 0.025
      effect: contribution history and recognition demand fuse into symbolic credit conflict
  suppressions:
    - dominant: silence_interpretation_loop
      suppressed: public_private_split
      dominant_min_intensity: 0.62
      min_gap: -0.15
      suppression_delta: 0.04
      reason: mediated absence absorbs attention before public performance can organize the relation
    - dominant: complementary_dependency
      suppressed: pursuit_withdrawal
      dominant_min_intensity: 0.68
      min_gap: -0.15
      suppression_delta: 0.05
      reason: care obligation keeps contact mandatory, reducing the explanatory role of pursuit
    - dominant: double_bind
      suppressed: repair_avoidance
      dominant_min_intensity: 0.62
      min_gap: -0.15
      suppression_delta: 0.04
      reason: blocked meta-communication makes avoidance a symptom rather than the dominant pattern

