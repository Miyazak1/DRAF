recognition:
  effects:
    granted:
      repair_event_type: RepairEvent
      repair_method: explicit recognition
      repair_debt_delta: -0.08
      conflict_delta: -0.04
      demand_pressure_delta: -0.14
    partial:
      repair_event_type: RepairEvent
      repair_method: partial acknowledgment with residue
      repair_debt_delta: -0.02
      conflict_delta: -0.01
      demand_pressure_delta: -0.04
    misunderstood:
      repair_event_type: MisrecognitionEvent
      repair_method: wrong layer addressed
      repair_debt_delta: 0.05
      conflict_delta: 0.03
      demand_pressure_delta: 0.04
    displaced:
      repair_event_type: DisplacementEvent
      repair_method: practical or public substitute
      repair_debt_delta: 0.06
      conflict_delta: 0.01
      demand_pressure_delta: 0.03
    refused:
      repair_event_type: MisrecognitionEvent
      repair_method: recognition claim rejected
      repair_debt_delta: 0.08
      conflict_delta: 0.06
      demand_pressure_delta: 0.06
    postponed:
      repair_event_type: AvoidanceEvent
      repair_method: deferred under timing or audience pressure
      repair_debt_delta: 0.04
      conflict_delta: 0.01
      demand_pressure_delta: 0.03
    unspeakable:
      repair_event_type: AvoidanceEvent
      repair_method: direct recognition made unsayable
      repair_debt_delta: 0.07
      conflict_delta: 0.04
      demand_pressure_delta: 0.05

fate_transitions:
  min_tick: 6
  threshold: 0.62
